version: '3.8'

services:
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: stadiumiq-postgres
    environment:
      POSTGRES_DB: stadiumiq
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stadiumiq"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stadiumiq-network

  redis-cache:
    image: redis:7-alpine
    container_name: stadiumiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stadiumiq-network

  influx-db:
    image: influxdb:2.7-alpine
    container_name: stadiumiq-influx
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword123
      DOCKER_INFLUXDB_INIT_ORG: stadiumiq_org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: adminsecrettokenkey12345
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - stadiumiq-network

  minio-storage:
    image: minio/minio
    container_name: stadiumiq-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stadiumiq-network

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: stadiumiq-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - stadiumiq-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stadiumiq-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - stadiumiq-network

  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stadiumiq-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - stadiumiq-network

  api-gateway:
    image: kong:3.4-alpine
    container_name: stadiumiq-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./services/api-gateway:/usr/local/kong/declarative
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - stadiumiq-network

  fan-service:
    build:
      context: .
      dockerfile: services/fan-service/Dockerfile
    container_name: stadiumiq-fan-service
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgres-db:5432/stadiumiq?schema=public
      REDIS_URL: redis://redis-cache:6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - stadiumiq-network

  volunteer-service:
    build:
      context: .
      dockerfile: services/volunteer-service/Dockerfile
    container_name: stadiumiq-volunteer-service
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgres-db:5432/stadiumiq?schema=public
      REDIS_URL: redis://redis-cache:6379
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - stadiumiq-network

  transport-service:
    build:
      context: .
      dockerfile: services/transport-service/Dockerfile
    container_name: stadiumiq-transport-service
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgres-db:5432/stadiumiq?schema=public
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - stadiumiq-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: stadiumiq-ai-service
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgres-db:5432/stadiumiq?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - stadiumiq-network

  crowd-intel-service:
    build:
      context: ./services/crowd-intel-service
      dockerfile: Dockerfile
    container_name: stadiumiq-crowd-intel-service
    environment:
      INFLUX_URL: http://influx-db:8086
      INFLUX_TOKEN: adminsecrettokenkey12345
      INFLUX_ORG: stadiumiq_org
      INFLUX_BUCKET: telemetry_bucket
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      influx-db:
        condition: service_healthy
    networks:
      - stadiumiq-network

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  minio_data:
  opensearch_data:

networks:
  stadiumiq-network:
    driver: bridge
